apiVersion: apps/v1
kind: Deployment
metadata:
  name: cyphershare-backend
  namespace: cyphershare
  labels:
    app: cyphershare-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cyphershare-backend
  template:
    metadata:
      labels:
        app: cyphershare-backend
    spec:
      containers:
      - name: backend
        image: cyphershare/backend:latest
        ports:
        - containerPort: 8001
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "k8s"
        - name: REDIS_HOST
          value: "redis"
        - name: REDIS_PORT
          value: "6379"
        - name: POSTGRES_HOST
          value: "postgres"
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_DB
          value: "cyphershare"
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: username
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: password
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /api/relay/health
            port: 8001
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/relay/health
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: cyphershare-backend
  namespace: cyphershare
spec:
  selector:
    app: cyphershare-backend
  ports:
  - port: 8001
    targetPort: 8001
  type: ClusterIP