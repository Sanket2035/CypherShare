apiVersion: apps/v1
kind: Deployment
metadata:
  name: cyphershare-frontend
  namespace: cyphershare
  labels:
    app: cyphershare-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cyphershare-frontend
  template:
    metadata:
      labels:
        app: cyphershare-frontend
    spec:
      containers:
      - name: frontend
        image: cyphershare/frontend:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cyphershare-frontend
  namespace: cyphershare
spec:
  selector:
    app: cyphershare-frontend
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP